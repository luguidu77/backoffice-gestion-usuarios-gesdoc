<aside class="sidebar" [class.collapsed]="isCollapsed">
    <!-- Cabecera del sidebar (Logo/TÃ­tulo y botÃ³n contraer) -->
    <div class="sidebar-header">
        <div class="brand" *ngIf="!isCollapsed">
            <span class="brand-avatar" aria-hidden="true">{{ initials }}</span>
            <div class="brand-info">
                <span class="brand-title">{{ displayName }}</span>
                <span *ngIf="roleLabel" class="brand-role" [ngClass]="roleClass">{{ roleLabel }}</span>
            </div>
        </div>
        <div class="brand-collapsed" *ngIf="isCollapsed">
            <span class="brand-avatar" aria-hidden="true" [title]="displayName">{{ initials }}</span>
        </div>
        <button class="toggle-btn" (click)="toggleSidebar()"
            [attr.aria-label]="isCollapsed ? 'Expandir menÃº' : 'Contraer menÃº'"
            [title]="isCollapsed ? 'Expandir' : 'Contraer'">
            <span aria-hidden="true" *ngIf="!isCollapsed">&laquo;</span>
            <span aria-hidden="true" *ngIf="isCollapsed">&raquo;</span>
        </button>
    </div>

    <!-- NavegaciÃ³n principal -->
    <nav class="sidebar-nav" aria-label="NavegaciÃ³n principal">
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-link" aria-label="Ir al Dashboard"
            title="Dashboard">
            <span class="nav-icon" aria-hidden="true">🏠</span>
            <span class="nav-text" *ngIf="!isCollapsed">Dashboard</span>
        </a>

        <a *ngIf="canManageUsers" routerLink="/users" routerLinkActive="active" class="nav-link"
            aria-label="GestiÃ³n de usuarios" title="Usuarios">
            <span class="nav-icon" aria-hidden="true">👤</span>
            <span class="nav-text" *ngIf="!isCollapsed">Usuarios</span>
        </a>

        <a *ngIf="canViewAudits" routerLink="/users/auditoria" routerLinkActive="active" class="nav-link"
            aria-label="Auditoría de reasignaciones" title="Auditoría">
            <span class="nav-icon" aria-hidden="true">📑</span>
            <span class="nav-text" *ngIf="!isCollapsed">Auditoría</span>
        </a>

        <a routerLink="/unidades" routerLinkActive="active" class="nav-link" aria-label="GestiÃ³n de unidades"
            title="Unidades">
            <span class="nav-icon" aria-hidden="true">🏢</span>
            <span class="nav-text" *ngIf="!isCollapsed">Unidades</span>
        </a>
    </nav>

    <!-- Usuario y logout (Abajo del todo) -->
    <div class="sidebar-footer" *ngIf="authService.isAuthenticated()">
        <button class="btn-logout nav-link" (click)="logout()" aria-label="Cerrar sesiÃ³n" title="Salir">
            <span class="nav-icon" aria-hidden="true">🚪</span>
            <span class="nav-text" *ngIf="!isCollapsed">Salir</span>
        </button>
    </div>
</aside>
