<div class="dashboard">

  <header class="dashboard-header">
    <h1 class="dashboard-title">Dashboard</h1>
    <p class="dashboard-subtitle">Panel de control del Backoffice</p>
  </header>

  <div class="cards-grid">

    <!-- ============================================================
         TARJETA 1: Estado del backend Spring Boot
         ============================================================ -->
    <div class="card">
      <div class="card-header">
        <span class="card-icon" aria-hidden="true">&#128279;</span>
        <h2>Estado del Backend</h2>
      </div>
      <div class="card-body">
        <p class="status-label">Respuesta de <code>GET /ping</code>:</p>

        <!-- Sintaxis @if / @else de Angular 17 (nueva control flow API) -->
        @if (pingLoading()) {
          <app-loading-spinner />
        } @else if (pingError()) {
          <span class="badge badge-error">&#10005; {{ pingStatus() }}</span>
        } @else {
          <span class="badge badge-success">&#10003; {{ pingStatus() }}</span>
        }

        <button
          class="btn-refresh"
          (click)="checkPing()"
          [disabled]="pingLoading()"
          aria-label="Volver a comprobar el estado del backend">
          &#8635; Actualizar
        </button>
      </div>
    </div>



  </div>
</div>
