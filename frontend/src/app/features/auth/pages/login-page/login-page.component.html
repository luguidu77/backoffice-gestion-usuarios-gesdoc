<div class="login-container">
  <div class="login-card">
    <!-- Encabezado -->
    <div class="login-header">
      <h1>Gestión de Usuarios</h1>
      <p>Backoffice - Guardia Civil</p>
    </div>

    <!-- Formulario -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <!-- Campo Usuario -->
      <div class="form-group">
        <label for="username">Usuario</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="Introduce tu usuario"
          [class.invalid]="isFieldInvalid('username')"
          autocomplete="username"
        />
        <div class="error-message" *ngIf="hasError('username', 'required')">
          El usuario es obligatorio
        </div>
        <div class="error-message" *ngIf="hasError('username', 'minlength')">
          El usuario debe tener al menos 3 caracteres
        </div>
      </div>

      <!-- Campo Contraseña -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Introduce tu contraseña"
          [class.invalid]="isFieldInvalid('password')"
          autocomplete="current-password"
        />
        <div class="error-message" *ngIf="hasError('password', 'required')">
          La contraseña es obligatoria
        </div>
        <div class="error-message" *ngIf="hasError('password', 'minlength')">
          La contraseña debe tener al menos 3 caracteres
        </div>
      </div>

      <!-- Mensaje de error general -->
      <div class="alert alert-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Botón de submit -->
      <button
        type="submit"
        class="btn-primary"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Iniciar Sesión</span>
        <span *ngIf="loading">Iniciando sesión...</span>
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p>Sistema de autenticación mediante Alfresco</p>
    </div>
  </div>
</div>
