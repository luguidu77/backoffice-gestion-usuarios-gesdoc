# ============================================================
# CONFIGURACIÓN DE LA APLICACIÓN BACKOFFICE
# Spring Boot lee este fichero automáticamente al arrancar
# ============================================================

# Puerto en el que escucha el servidor Tomcat embebido.
# Acceder desde el navegador: http://localhost:8085
server.port=8085

# Nombre de la aplicación (aparece en los logs de arranque)
spring.application.name=backoffice-test

# Encoding de las respuestas HTTP
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ============================================================
# LOGGING
# Niveles: TRACE < DEBUG < INFO < WARN < ERROR
# INFO es el nivel recomendado para desarrollo normal.
# Cambiar es.dggc.backoffice a DEBUG para ver más detalles
# de los controladores y servicios propios.
# ============================================================
logging.level.root=INFO
logging.level.es.dggc.backoffice=DEBUG

# Mostrar peticiones HTTP entrantes en los logs (útil durante desarrollo)
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

# ============================================================
# SPRING MVC / WEB
# ============================================================
# Añadir siempre el trailing slash (GET /ping == GET /ping/)
spring.mvc.pathmatch.use-suffix-pattern=false
# Necesario para patrones de rutas SPA en HomeController
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Límite de subida para justificantes PDF de auditoría
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ============================================================
# MENSAJES DE ARRANQUE
# Si se pone a false, no se muestra el banner ASCII de Spring
# ============================================================
# spring.main.banner-mode=off

# ============================================================
# INTEGRACION CON ALFRESCO
# Alfresco Enterprise 23.5.0
# API REST v1: https://api-explorer.alfresco.com/api-explorer/
# ============================================================

# URL base del servidor Alfresco (sin /api al final)
alfresco.base-url=https://alfresco23pre.guardiacivil.es/alfresco

# SSL para entorno de preproducción/producción Alfresco
# Certificado empaquetado dentro del JAR
alfresco.ssl.enabled=true
alfresco.ssl.certificate=classpath:certs/guardiacivil-es.pem

# Endpoints de la API REST v1
alfresco.api.authentication=/api/-default-/public/authentication/versions/1
alfresco.api.core=/api/-default-/public/alfresco/versions/1

# Timeout de conexión (milisegundos)
alfresco.connection.timeout=5000
alfresco.read.timeout=10000

# URL completa de la API REST v1
alfresco.api-url=${alfresco.base-url}/api/-default-/public/alfresco/versions/1

# Timeout de conexión en milisegundos (10 segundos)
alfresco.connection-timeout=10000

# Timeout de lectura en milisegondos (30 segundos)
alfresco.read-timeout=30000

# Tipo de autenticación: BASIC o TICKET
alfresco.auth-type=BASIC
