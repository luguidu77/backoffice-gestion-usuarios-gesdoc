# ============================================================
# CONFIGURACIÓN DE LA APLICACIÓN BACKOFFICE
# PERFIL LOCAL
# 
# Activar con: -Dspring.profiles.active=local
# ============================================================

# Cambiamos el puerto para asegurarnos que sabemos que es el perfil local,
# aunque podemos dejarlo en 8085 si preferimos mantener consistencia con proxy.conf.json.
# Lo dejamos en 8085 porque proxy.conf.json de Angular espera a este por defecto
server.port=8085

# Necesario para patrones de rutas SPA en HomeController
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ============================================================
# LOGGING
# Mayor nivel de log para desarrollo
# ============================================================
logging.level.es.dggc.backoffice=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.apache.http=DEBUG

# ============================================================
# INTEGRACION CON ALFRESCO
# URL de Alfresco en un entorno LOCAL
# Ajustar según donde se ejecute Alfresco local
# ============================================================
alfresco.base-url=http://localhost:8080/alfresco
alfresco.api-url=${alfresco.base-url}/api/-default-/public/alfresco/versions/1

# Quitar timeout estricto en local para poder debuggear si hace falta
alfresco.connection-timeout=60000
alfresco.read-timeout=120000
